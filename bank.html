<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAY 은행</title>
<style>
  :root{
    --navy:#15356b; --blue:#2e6fe8; --bg:#eef2f8; --card:#ffffff;
    --ink:#0f1a2e; --mut:#64748b; --line:#e2e8f2;
    --red:#c8202e; --dark:#141821; --gold:#caa14a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic",Pretendard,system-ui,sans-serif;
    background:var(--bg); color:var(--ink); min-height:100vh;
    display:flex; align-items:center; justify-content:center; padding:20px;
    transition:background .6s ease;
    -webkit-tap-highlight-color:transparent;
  }
  body.betrayed{background:var(--dark)}
  .mono{font-family:"SF Mono","Roboto Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums}
  .app{width:100%; max-width:430px}

  /* ---- 가입 ---- */
  .gate{background:var(--card); border-radius:22px; padding:40px 30px; text-align:center;
        box-shadow:0 20px 50px rgba(21,53,107,.12)}
  .logo{display:inline-flex; align-items:center; gap:9px; cursor:pointer; user-select:none}
  .mark{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--navy),var(--blue));
        display:grid;place-items:center;color:#fff;font-weight:800;font-size:18px}
  .logo b{font-size:21px;letter-spacing:-.5px;color:var(--navy)}
  .gate h1{font-size:19px;margin:26px 0 6px;letter-spacing:-.4px}
  .gate p{color:var(--mut);font-size:13.5px;line-height:1.6;margin-bottom:24px}
  input{width:100%;padding:15px 16px;border:1.5px solid var(--line);border-radius:13px;
        font-size:16px;font-family:inherit;outline:none;transition:border .2s}
  input:focus{border-color:var(--blue)}
  .btn{width:100%;padding:15px;border:none;border-radius:13px;background:var(--navy);color:#fff;
       font-size:15.5px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:13px;
       transition:transform .12s, background .2s; letter-spacing:-.3px}
  .btn:active{transform:scale(.98)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn.ghost{background:#eef2fb;color:var(--navy)}

  /* ---- 메인 ---- */
  .hidden{display:none}
  .top{display:flex;justify-content:space-between;align-items:center;padding:4px 6px 16px}
  .top .logo b{color:#fff}
  body:not(.betrayed) .top .logo b{color:var(--navy)}
  .who{font-size:13px;color:var(--mut)}
  body.betrayed .who{color:#8b94a4}

  .balcard{background:linear-gradient(140deg,var(--navy),var(--blue));border-radius:20px;
           padding:24px 24px 26px;color:#fff;box-shadow:0 14px 34px rgba(21,53,107,.28);
           transition:background .6s}
  body.betrayed .balcard{background:linear-gradient(140deg,#3a0d12,var(--red))}
  .balcard .lab{font-size:12.5px;opacity:.8;letter-spacing:.3px}
  .balcard .amt{font-size:34px;font-weight:800;margin-top:7px;letter-spacing:-1px;transition:color .3s}
  .balcard .amt.flash{animation:shake .5s}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}

  .actions{display:flex;gap:10px;margin:14px 0}
  .actions .btn{margin-top:0}
  .actions .buy{background:var(--blue)}

  .ledger{background:var(--card);border-radius:18px;padding:18px;margin-top:4px;
          box-shadow:0 8px 24px rgba(21,53,107,.08);transition:opacity .5s,transform .5s}
  .ledger.destroyed{opacity:0;transform:scale(.9);pointer-events:none}
  .ledger .lh{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--mut);
              padding-bottom:12px;border-bottom:1px dashed var(--line);margin-bottom:6px}
  .lock{font-size:13px}
  .row{display:flex;justify-content:space-between;padding:11px 2px;font-size:14px;
       border-bottom:1px solid #f1f5fb}
  .row:last-child{border:none}
  .row .desc{color:#334155}
  .row .v{font-weight:700}
  .row .v.minus{color:#334155}
  .row.evil{background:#fff0f1;margin:0 -8px;padding:11px 10px;border-radius:9px;animation:pop .5s}
  .row.evil .desc{color:var(--red);font-weight:700}
  .row.evil .v{color:var(--red)}
  @keyframes pop{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}

  .note{margin-top:16px;padding:16px 18px;border-radius:14px;font-size:14px;line-height:1.7;
        background:#fff;border-left:4px solid var(--gold);box-shadow:0 8px 24px rgba(0,0,0,.06)}
  .note.warn{background:#1c0e10;border-color:var(--red);color:#ffd9dc}
  .note.think{background:#10243f;border-color:var(--blue);color:#cfe2ff}
  .note b{display:block;margin-bottom:5px;font-size:14.5px}
  .note.warn b{color:#fff}
  .note.think b{color:#fff}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);
         background:var(--dark);color:#fff;padding:13px 20px;border-radius:12px;font-size:13.5px;
         box-shadow:0 10px 30px rgba(0,0,0,.3);transition:transform .35s;z-index:50;max-width:90vw;text-align:center}
  .toast.show{transform:translateX(-50%) translateY(0)}

  /* 진행자 패널 */
  .host{position:fixed;top:12px;left:50%;transform:translateX(-50%);display:flex;gap:7px;
        background:rgba(20,24,33,.94);padding:8px;border-radius:13px;z-index:60;flex-wrap:wrap;
        justify-content:center;box-shadow:0 8px 24px rgba(0,0,0,.3)}
  .host.hidden{display:none}
  .host button{border:none;background:#2a3242;color:#fff;font-size:12px;padding:8px 12px;
               border-radius:9px;font-family:inherit;cursor:pointer;font-weight:600}
  .host button.danger{background:var(--red)}
  .host button.reset{background:#3a4456}
  .host .tag{color:#8b94a4;font-size:11px;align-self:center;padding:0 4px}
</style>
</head>
<body>

<div class="app">

  <!-- 가입 화면 -->
  <div id="gate" class="gate">
    <div class="logo" id="logo"><span class="mark">B</span><b>BAY 은행</b></div>
    <h1>믿고 맡기는 든든한 은행</h1>
    <p>계좌를 개설하면 잔고를 안전하게 보관해 드립니다.<br>장부 관리는 저희 BAY 은행에 맡겨주세요.</p>
    <input id="name" placeholder="이름을 입력하세요" autocomplete="off" maxlength="12">
    <button class="btn" id="join">계좌 개설하기</button>
  </div>

  <!-- 메인 화면 -->
  <div id="main" class="hidden">
    <div class="top">
      <div class="logo"><span class="mark">B</span><b>BAY 은행</b></div>
      <div class="who" id="who"></div>
    </div>

    <div class="balcard">
      <div class="lab">내 잔고</div>
      <div class="amt mono" id="bal">₩1,000,000</div>
    </div>

    <div class="actions">
      <button class="btn buy" id="buy">🥖 빵 사기 (₩3,000)</button>
    </div>

    <div class="ledger" id="ledger">
      <div class="lh"><span class="lock">🔒</span> 이 장부는 BAY 은행이 보관·관리합니다</div>
      <div id="rows"></div>
    </div>

    <div id="msgZone"></div>
  </div>

</div>

<!-- 진행자(팀장) 패널 — 로고 3번 클릭으로 토글 -->
<div class="host hidden" id="host">
  <span class="tag">진행자</span>
  <button class="danger" id="hManip">잔고 몰래 조작</button>
  <button class="danger" id="hDestroy">장부 파괴</button>
  <button class="reset" id="hReset">처음으로</button>
</div>

<div class="toast" id="toast"></div>

<script>
const S = { name:'', bal:1000000, bread:0, manipulated:false, destroyed:false };
const won = n => '₩' + n.toLocaleString('ko-KR');
const $ = id => document.getElementById(id);

function toast(t){ const el=$('toast'); el.textContent=t; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),2600); }

// ---- 가입 ----
$('join').onclick = () => {
  const v = $('name').value.trim();
  if(!v){ $('name').focus(); return; }
  S.name = v;
  $('who').textContent = v + ' 님';
  $('gate').classList.add('hidden');
  $('main').classList.remove('hidden');
  addRow('계좌 개설', '+1,000,000', 'plus');
  toast(v + ' 님, 1,000,000원이 입금되었습니다');
};
$('name').addEventListener('keydown', e => { if(e.key==='Enter') $('join').click(); });

// ---- 장부 행 추가 ----
function addRow(desc, val, kind){
  const r = document.createElement('div');
  r.className = 'row' + (kind==='evil' ? ' evil' : '');
  r.innerHTML = `<span class="desc">${desc}</span><span class="v mono ${kind==='evil'?'':'minus'}">${val}</span>`;
  $('rows').appendChild(r);
}
function setBal(n, flash){
  S.bal = n;
  const el = $('bal');
  el.textContent = S.destroyed ? '₩ ???' : won(n);
  if(flash){ el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash'); }
}

// ---- 빵 사기 ----
$('buy').onclick = () => {
  if(S.destroyed){
    toast('장부가 없어 당신의 잔고를 증명할 수 없습니다 — 빵을 살 수 없습니다');
    return;
  }
  if(S.bal < 3000){ toast('잔고가 부족합니다'); return; }
  S.bread++;
  setBal(S.bal - 3000, true);
  addRow(`빵 구매 #${S.bread}`, '-3,000', 'minus');
  // 자기 페이스: 3번째 구매 시 자동으로 배신 발동(진행자가 먼저 안 했다면)
  if(S.bread === 3 && !S.manipulated){ manipulate(); }
};

// ---- 배신 1: 잔고 조작 ----
function manipulate(){
  if(S.manipulated || S.destroyed) return;
  S.manipulated = true;
  document.body.classList.add('betrayed');
  const keep = 6000;
  const stolen = S.bal > keep ? S.bal - keep : Math.floor(S.bal*0.9);
  setBal(S.bal - stolen, true);
  addRow('⚠ 관리자 조정 (사유 미기재)', '-' + stolen.toLocaleString('ko-KR'), 'evil');
  $('msgZone').innerHTML = `
    <div class="note warn">
      <b>은행이 당신 몰래 장부를 고쳤습니다.</b>
      당신은 한 푼도 인출하지 않았는데 ${won(stolen)}이 사라졌어요.
      장부를 은행 혼자 쥐고 있으니, 막을 방법이 없습니다.
    </div>`;
  toast('잔고가 조작되었습니다');
}

// ---- 배신 2: 장부 파괴 ----
function destroy(){
  if(S.destroyed) return;
  S.destroyed = true;
  document.body.classList.add('betrayed');
  $('ledger').classList.add('destroyed');
  setBal(0);
  $('msgZone').innerHTML = `
    <div class="note warn">
      <b>은행 서버 오류 — 장부가 사라졌습니다.</b>
      당신의 돈이 얼마인지 증명할 기록이 없어졌어요.
      이제 빵을 사려 해도 잔고를 증명할 수 없습니다.
    </div>
    <div class="note think">
      <b>그런데… 막을 방법이 있었을까요?</b>
      만약 이 장부를 은행 혼자가 아니라 <b>모두가 똑같은 사본으로</b> 나눠 갖고 있었다면,
      아무도 몰래 고치거나 지울 수 없었겠죠. 그게 다음 주에 배울 이야기입니다.
    </div>`;
  toast('장부가 파괴되었습니다');
}

// ---- 진행자 모드 (로고 3번 클릭) ----
let clicks = 0, clickT;
$('logo').addEventListener('click', () => {
  clicks++; clearTimeout(clickT); clickT = setTimeout(()=>clicks=0, 600);
  if(clicks >= 3){ clicks=0; $('host').classList.toggle('hidden'); }
});
$('hManip').onclick = manipulate;
$('hDestroy').onclick = destroy;
$('hReset').onclick = () => {
  Object.assign(S, { name:'', bal:1000000, bread:0, manipulated:false, destroyed:false });
  document.body.classList.remove('betrayed');
  $('rows').innerHTML=''; $('msgZone').innerHTML='';
  $('ledger').classList.remove('destroyed');
  $('bal').textContent = won(1000000);
  $('name').value=''; $('main').classList.add('hidden'); $('gate').classList.remove('hidden');
  $('host').classList.add('hidden');
};
</script>
</body>
</html>
