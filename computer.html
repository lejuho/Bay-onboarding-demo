<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이더리움 — 월드 컴퓨터</title>
<style>
  :root{
    --eth:#6b5bd2; --eth2:#8a7fe8; --ink:#1b1f2e; --mut:#6b7280;
    --chrome:#eef0f5; --line:#d6dae4; --screen:#ffffff;
    --red:#d64545; --green:#2fb87f; --amber:#e8a13a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    background:linear-gradient(160deg,#dadde6,#c3c7d3); min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:18px;color:var(--ink);
    -webkit-tap-highlight-color:transparent;
  }
  .mono{font-family:"SF Mono","Roboto Mono",ui-monospace,monospace}
  .wrap{width:100%;max-width:440px}

  /* 가입 */
  .gate{background:var(--screen);border-radius:18px;padding:38px 28px;text-align:center;
        box-shadow:0 22px 50px rgba(40,40,80,.22);border:1px solid var(--line)}
  .glyph{width:46px;height:46px;margin:0 auto;cursor:pointer;user-select:none}
  .glyph svg{width:100%;height:100%}
  .gate h1{font-size:18px;margin:18px 0 6px;letter-spacing:-.4px}
  .gate p{color:var(--mut);font-size:13.5px;line-height:1.6;margin-bottom:22px}
  input{width:100%;padding:14px 15px;border:1.5px solid var(--line);border-radius:12px;
        font-size:16px;font-family:inherit;outline:none}
  input:focus{border-color:var(--eth)}
  .btn{width:100%;padding:14px;border:none;border-radius:12px;background:var(--eth);color:#fff;
       font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:12px;
       transition:transform .12s,opacity .2s;letter-spacing:-.3px}
  .btn:active{transform:scale(.98)}
  .btn:disabled{opacity:.35;cursor:not-allowed}

  /* 컴퓨터 창 */
  .hidden{display:none}
  .win{background:var(--chrome);border-radius:14px;overflow:hidden;border:1px solid var(--line);
       box-shadow:0 22px 50px rgba(40,40,80,.28)}
  .titlebar{display:flex;align-items:center;gap:8px;padding:11px 14px;background:linear-gradient(#f7f8fb,#e9ebf2);
            border-bottom:1px solid var(--line)}
  .dots{display:flex;gap:6px}
  .dots i{width:11px;height:11px;border-radius:50%;display:block}
  .dots i:nth-child(1){background:#e06b5e}.dots i:nth-child(2){background:#e3b14b}.dots i:nth-child(3){background:#5cb867}
  .title{font-size:13px;font-weight:700;letter-spacing:-.2px;display:flex;align-items:center;gap:6px}
  .title .e{width:13px;height:13px}
  .respno{color:var(--red);font-size:12px;font-weight:700;margin-left:auto}

  .screen{background:var(--screen);min-height:215px;padding:20px;position:relative;overflow:hidden}
  .who{font-size:12px;color:var(--mut);margin-bottom:12px}
  .out{font-size:14px;line-height:1.7;min-height:110px}
  .out .line{padding:3px 0;animation:fade .25s}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
  .out .ok{color:var(--green);font-weight:700}
  .out .art{font-size:13px;line-height:1.25;color:var(--eth);white-space:pre}
  .out .err{color:var(--red);font-weight:700}
  .placeholder{color:#aab;font-size:13px}

  /* 멈춤(beachball) 오버레이 */
  .freeze{position:absolute;inset:0;background:rgba(255,255,255,.82);backdrop-filter:blur(1px);
          display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px}
  .freeze.on{display:flex}
  .ball{width:46px;height:46px;border-radius:50%;
        background:conic-gradient(var(--eth),var(--eth2),#d96,#6cc,var(--eth));
        animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .freeze .ft{font-size:13px;color:var(--mut)} .freeze .ft b{color:var(--ink)}

  /* 가스 게이지 */
  .gas{padding:13px 16px;background:#f8f9fc;border-top:1px solid var(--line);display:none}
  .gas.on{display:block}
  .gas .gl{display:flex;justify-content:space-between;font-size:11.5px;color:var(--mut);margin-bottom:6px}
  .gas .gl b{color:var(--ink)}
  .bar{height:12px;background:#e6e8f0;border-radius:7px;overflow:hidden}
  .fill{height:100%;width:100%;background:var(--green);border-radius:7px;transition:width .08s linear}

  /* 프로그램 버튼 */
  .pad{padding:14px 16px 16px;background:var(--chrome);border-top:1px solid var(--line);
       display:flex;flex-direction:column;gap:9px}
  .prog{display:flex;align-items:center;gap:11px;padding:13px 15px;border:1px solid var(--line);
        border-radius:11px;background:#fff;cursor:pointer;font-size:14px;font-weight:600;
        font-family:inherit;text-align:left;transition:transform .12s,border .2s}
  .prog:active{transform:scale(.985)}
  .prog:disabled{opacity:.4;cursor:not-allowed}
  .prog .ic{font-size:18px}
  .prog.evil{border-color:#f0c4c4;background:#fff6f6;color:var(--red)}
  .prog .sub{font-size:11.5px;font-weight:500;color:var(--mut);margin-top:1px}
  .prog.evil .sub{color:#c98}

  .advance{margin-top:4px;background:var(--ink);color:#fff;border:none;padding:13px;border-radius:11px;
           font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;display:none}
  .advance.on{display:block;animation:fade .4s}

  .msg{margin-top:14px;padding:15px 17px;border-radius:13px;font-size:13.5px;line-height:1.7;
       background:#fff;box-shadow:0 10px 26px rgba(40,40,80,.12)}
  .msg.bad{border-left:4px solid var(--red)} .msg.good{border-left:4px solid var(--green)}
  .msg.think{border-left:4px solid var(--eth)}
  .msg b{display:block;margin-bottom:4px}
  .actband{font-size:11px;font-weight:800;letter-spacing:1px;color:var(--eth);margin:2px 2px 10px}

  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(70px);
         background:var(--ink);color:#fff;padding:12px 18px;border-radius:11px;font-size:13px;
         transition:transform .35s;z-index:50;max-width:90vw;text-align:center}
  .toast.show{transform:translateX(-50%) translateY(0)}

  .host{position:fixed;top:10px;left:50%;transform:translateX(-50%);display:flex;gap:7px;flex-wrap:wrap;
        background:rgba(27,31,46,.95);padding:8px;border-radius:12px;z-index:60;justify-content:center}
  .host.hidden{display:none}
  .host button{border:none;background:#343a52;color:#fff;font-size:12px;padding:8px 11px;border-radius:8px;
               font-family:inherit;font-weight:600;cursor:pointer}
  .host .tag{color:#9aa1b8;font-size:11px;align-self:center;padding:0 3px}
</style>
</head>
<body>
<div class="wrap">

  <!-- 가입 -->
  <div id="gate" class="gate">
    <div class="glyph" id="glyph">
      <svg viewBox="0 0 24 24"><path d="M12 1.5 5 12l7 4 7-4z" fill="#6b5bd2"/><path d="M12 1.5 5 12l7-3.2z" fill="#8a7fe8"/><path d="M5 13.4 12 22.5 19 13.4 12 17.5z" fill="#6b5bd2"/></svg>
    </div>
    <h1>이더리움 — 월드 컴퓨터</h1>
    <p>전 세계가 함께 쓰는 하나의 컴퓨터입니다.<br>접속하면 누구나 이 컴퓨터에서 프로그램을 실행할 수 있어요.</p>
    <input id="name" placeholder="이름을 입력하세요" autocomplete="off" maxlength="12">
    <button class="btn" id="join">월드 컴퓨터에 접속</button>
  </div>

  <!-- 컴퓨터 -->
  <div id="main" class="hidden">
    <div class="win">
      <div class="titlebar">
        <span class="dots"><i></i><i></i><i></i></span>
        <span class="title">
          <svg class="e" viewBox="0 0 24 24"><path d="M12 1.5 5 12l7 4 7-4z" fill="#6b5bd2"/><path d="M5 13.4 12 22.5 19 13.4 12 17.5z" fill="#6b5bd2"/></svg>
          ETHEREUM
        </span>
        <span class="respno hidden" id="respno">(응답 없음)</span>
      </div>

      <div class="screen">
        <div class="who" id="who"></div>
        <div class="out" id="out"><div class="placeholder">아래에서 프로그램을 실행해 보세요.</div></div>
        <div class="freeze" id="freeze">
          <div class="ball"></div>
          <div class="ft"><b>처리 중…</b> (영원히 끝나지 않음)</div>
        </div>
      </div>

      <div class="gas" id="gas">
        <div class="gl"><span>⛽ 가스 잔량</span><b id="gasNum">100</b></div>
        <div class="bar"><div class="fill" id="gasFill"></div></div>
      </div>

      <div class="pad">
        <button class="prog" id="pNormal"><span class="ic">🧮</span>
          <span>정상 프로그램 실행<span class="sub">간단한 계산을 수행합니다</span></span></button>
        <button class="prog evil" id="pLoop"><span class="ic">♾️</span>
          <span>악성 프로그램 실행 (무한 루프)<span class="sub">끝나지 않는 작업을 시킵니다</span></span></button>
        <button class="advance" id="advance">이더리움의 해결책 보기 →</button>
      </div>
    </div>
    <div id="msgZone"></div>
  </div>
</div>

<div class="host hidden" id="host">
  <span class="tag">진행자</span>
  <button id="hFreeze">무한루프 발동</button>
  <button id="hAct2">2막(가스)로</button>
  <button id="hReset">처음으로</button>
</div>
<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const S = { name:'', phase:1, frozen:false, gas:100, gasTimer:null, freezeTimer:null };

function toast(t){const e=$('toast');e.textContent=t;e.classList.add('show');
  clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),2600);}
function out(html){ $('out').innerHTML = html; }
function line(html,cls=''){ const d=document.createElement('div'); d.className='line '+cls; d.innerHTML=html;
  if($('out').querySelector('.placeholder')) $('out').innerHTML='';
  $('out').appendChild(d); }

// 가입
$('join').onclick = () => {
  const v=$('name').value.trim(); if(!v){$('name').focus();return;}
  S.name=v; $('who').textContent='접속: '+v+' 님';
  $('gate').classList.add('hidden'); $('main').classList.remove('hidden');
};
$('name').addEventListener('keydown',e=>{if(e.key==='Enter')$('join').click();});

// 정상 프로그램
$('pNormal').onclick = () => {
  if(S.frozen) return;
  if(S.phase===2){ if(!spendGas(12)) return; }
  out('');
  line('> 프로그램 실행…');
  setTimeout(()=>line('1 + 1 = <span class="ok">2</span>'),250);
  setTimeout(()=>line('<span class="art">  ▲\n ▲ ▲\n▲ ▲ ▲</span>'),500);
  setTimeout(()=>line('<span class="ok">✓ 완료. 모두가 같은 결과를 봅니다.</span>'),760);
};

// 무한 루프
$('pLoop').onclick = () => {
  if(S.frozen) return;
  if(S.phase===1) freeze();
  else gasLoop();
};

// 1막: 멈춤
function freeze(){
  S.frozen=true;
  out(''); line('> 악성 프로그램 실행…');
  line('> while(true) { … }');
  $('freeze').classList.add('on');
  $('respno').classList.remove('hidden');
  $('pNormal').disabled=true; $('pLoop').disabled=true;
  toast('컴퓨터가 멈췄습니다 — 아무도 못 씁니다');
  // 3초간은 정말 아무것도 못 누르는 먹통 상태 → 그 뒤에 해결책/설명 등장
  clearTimeout(S.freezeTimer);
  S.freezeTimer = setTimeout(()=>{
    $('advance').classList.add('on');
    $('msgZone').innerHTML = `
      <div class="msg bad">
        <span class="actband">1막 · 가스가 없는 세상</span>
        <b>한 사람이 무한루프를 실행하자 컴퓨터 전체가 멈췄습니다.</b>
        이제 아무도 이 월드 컴퓨터를 쓸 수 없어요. 정상 프로그램 버튼도 먹통이죠.
        <b style="margin-top:8px">악의를 가진 한 명이 모두를 마비시킬 수 있다면, 이 컴퓨터는 쓸모가 없습니다.</b>
      </div>`;
  }, 6000);
}

// 2막 전환
function toAct2(){
  clearTimeout(S.freezeTimer);
  S.phase=2; S.frozen=false; S.gas=100;
  $('freeze').classList.remove('on'); $('respno').classList.add('hidden');
  $('pNormal').disabled=false; $('pLoop').disabled=false;
  $('advance').classList.remove('on');
  $('gas').classList.add('on'); updateGas();
  out('<div class="placeholder">이제 모든 프로그램은 \'가스\'를 소모합니다. 다시 실행해 보세요.</div>');
  $('msgZone').innerHTML = `
    <div class="msg think">
      <span class="actband">2막 · 가스의 등장</span>
      <b>이더리움은 이 문제를 '가스'로 풀었습니다.</b>
      모든 연산 한 걸음마다 가스를 소모하게 만들었어요.
      이제 무한루프를 다시 돌려보세요. 어떻게 되는지 보세요.
    </div>`;
}

function updateGas(){ $('gasNum').textContent=Math.max(0,Math.round(S.gas));
  $('gasFill').style.width=Math.max(0,S.gas)+'%';
  $('gasFill').style.background = S.gas>40?'var(--green)':(S.gas>15?'var(--amber)':'var(--red)'); }

function spendGas(n){
  if(S.gas < n){ toast('가스가 부족합니다'); return false; }
  S.gas-=n; updateGas(); return true;
}

// 2막: 무한루프 → 가스 소진 → revert
function gasLoop(){
  if(S.gas<=0){ toast('가스가 없습니다'); return; }
  S.frozen=true; $('pNormal').disabled=true; $('pLoop').disabled=true;
  out(''); line('> 악성 프로그램 실행… (가스 소모 시작)');
  clearInterval(S.gasTimer);
  S.gasTimer=setInterval(()=>{
    S.gas-=4; if(S.gas<0)S.gas=0; updateGas();
    if(S.gas<=0){
      clearInterval(S.gasTimer);
      line('> while(true) { … }');
      line('<span class="err">⛽ 가스 소진 → 프로그램 강제 종료 (REVERT)</span>');
      S.frozen=false; $('pNormal').disabled=false; $('pLoop').disabled=false;
      $('msgZone').innerHTML = `
        <div class="msg good">
          <span class="actband">2막 · 결말</span>
          <b>무한루프를 짜도 가스가 떨어지면 자동으로 죽습니다.</b>
          프로그램만 종료되고 <b>컴퓨터는 살아남았어요.</b> 정상 프로그램도 그대로 돌아갑니다.
          <b style="margin-top:8px">그래서 한 사람이 전체를 멈출 수 없습니다 — 이게 가스의 진짜 이유예요.</b>
        </div>`;
      toast('가스 소진 → 강제 종료. 컴퓨터는 살아있습니다');
    }
  },90);
}

$('advance').onclick = toAct2;

// 진행자
let c=0,ct; $('glyph').addEventListener('click',()=>{c++;clearTimeout(ct);ct=setTimeout(()=>c=0,600);
  if(c>=3){c=0;$('host').classList.toggle('hidden');}});
$('hFreeze').onclick=()=>{ if(S.phase===1&&!S.frozen)freeze(); else if(S.phase===2&&!S.frozen)gasLoop(); };
$('hAct2').onclick=()=>{ if(S.phase===1)toAct2(); };
$('hReset').onclick=()=>{
  clearInterval(S.gasTimer); clearTimeout(S.freezeTimer);
  Object.assign(S,{name:'',phase:1,frozen:false,gas:100,gasTimer:null,freezeTimer:null});
  $('freeze').classList.remove('on'); $('respno').classList.add('hidden');
  $('gas').classList.remove('on'); $('advance').classList.remove('on');
  $('pNormal').disabled=false; $('pLoop').disabled=false;
  $('out').innerHTML='<div class="placeholder">아래에서 프로그램을 실행해 보세요.</div>';
  $('msgZone').innerHTML=''; $('name').value='';
  $('main').classList.add('hidden'); $('gate').classList.remove('hidden'); $('host').classList.add('hidden');
};
</script>
</body>
</html>
