<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>작업증명 — 채굴해 보기</title>
<style>
  :root{
    --bg:#140f08; --panel:#1f1810; --card:#271d11; --ink:#f6ede0; --mut:#a8967e;
    --line:#3a2c19; --amber:#ffab2e; --amber2:#e0860f; --green:#48c26a; --red:#ff5d54;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
       background:radial-gradient(1100px 500px at 50% -10%,#2a1d0d,var(--bg));color:var(--ink);
       min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px;
       -webkit-tap-highlight-color:transparent}
  .mono{font-family:"SF Mono","Roboto Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums}
  .wrap{width:100%;max-width:460px}

  .gate{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:38px 28px;text-align:center;
        box-shadow:0 24px 60px rgba(0,0,0,.5)}
  .glyph{font-size:34px;cursor:pointer;user-select:none;display:inline-block}
  .gate h1{font-size:19px;margin:14px 0 6px;letter-spacing:-.4px}
  .gate p{color:var(--mut);font-size:13.5px;line-height:1.6;margin-bottom:22px}
  input,button{font-family:inherit}
  .nm{width:100%;padding:14px 15px;background:var(--card);border:1.5px solid var(--line);border-radius:12px;
      font-size:16px;outline:none;color:var(--ink)}
  .nm:focus{border-color:var(--amber)}
  .btn{width:100%;padding:14px;border:none;border-radius:12px;background:var(--amber2);color:#1a1206;
       font-size:15px;font-weight:800;cursor:pointer;margin-top:12px;transition:transform .12s}
  .btn:active{transform:scale(.98)}

  .hidden{display:none}
  .head{text-align:center;margin-bottom:14px}
  .head h2{font-size:17px;letter-spacing:-.4px}
  .head p{font-size:12.5px;color:var(--mut);margin-top:5px;line-height:1.5}
  .who{font-size:12px;color:var(--mut);text-align:center;margin-bottom:14px}

  .diff{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin-bottom:12px}
  .diff .dl{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:10px}
  .diff .dl b{color:var(--amber);font-size:15px}
  .diff .zeros{font-size:11px;color:var(--mut)}
  input[type=range]{width:100%;accent-color:var(--amber)}

  .block{background:var(--card);border:1.5px solid var(--line);border-radius:15px;padding:16px;margin-bottom:12px;
         transition:border-color .25s,box-shadow .25s}
  .block.mined{border-color:var(--green);box-shadow:0 0 0 1px var(--green),0 10px 30px rgba(72,194,106,.15)}
  .block.stale{border-color:var(--red);box-shadow:0 0 0 1px var(--red)}
  .bn{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .bn .name{font-size:13px;font-weight:800}
  .badge{font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px}
  .badge.mined{background:rgba(72,194,106,.16);color:var(--green)}
  .badge.idle{background:rgba(168,150,126,.16);color:var(--mut)}
  .badge.stale{background:rgba(255,93,84,.16);color:var(--red)}
  .fld{margin-bottom:10px}
  .fld label{display:block;font-size:10.5px;color:var(--mut);letter-spacing:.4px;margin-bottom:3px;text-transform:uppercase}
  .data{width:100%;padding:9px 11px;font-size:14px;border-radius:9px;background:#1a130a;
        border:1px solid var(--line);color:var(--ink);font-family:inherit;outline:none}
  .data:focus{border-color:var(--amber)}
  .stat{display:flex;gap:10px}
  .stat .s{flex:1;background:#1a130a;border:1px solid var(--line);border-radius:9px;padding:9px 11px}
  .stat .s .k{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.4px}
  .stat .s .v{font-size:16px;font-weight:800;margin-top:2px}
  .hashrow{font-size:12px;padding:9px 11px;border-radius:9px;background:#1a130a;border:1px solid var(--line);
           word-break:break-all;line-height:1.5;margin-top:4px}
  .hashrow .z{color:var(--green);font-weight:800}
  .hashrow .rest{color:var(--mut)}

  .mineBtn{width:100%;padding:14px;border:none;border-radius:12px;background:var(--amber);color:#1a1206;
           font-size:15px;font-weight:800;cursor:pointer;margin-top:6px;transition:transform .12s}
  .mineBtn:active{transform:scale(.98)}
  .mineBtn.mining{background:#4a3a20;color:var(--amber);cursor:default}

  .note{margin-top:6px;padding:15px 17px;border-radius:13px;font-size:13.5px;line-height:1.7;
        background:var(--panel);border-left:4px solid var(--amber)}
  .note.good{border-color:var(--green)} .note.warn{border-color:var(--red)}
  .note b{display:block;margin-bottom:4px}

  .host{position:fixed;top:10px;left:50%;transform:translateX(-50%);display:flex;gap:7px;flex-wrap:wrap;
        background:rgba(10,8,4,.95);border:1px solid var(--line);padding:8px;border-radius:12px;z-index:60;justify-content:center}
  .host.hidden{display:none}
  .host button{border:none;background:#3a2c19;color:#fff;font-size:12px;padding:8px 11px;border-radius:8px;
               font-weight:600;cursor:pointer}
  .host .tag{color:var(--mut);font-size:11px;align-self:center;padding:0 3px}
</style>
</head>
<body>
<div class="wrap">

  <div id="gate" class="gate">
    <div class="glyph" id="glyph">⛏️</div>
    <h1>작업증명 — 채굴해 보기</h1>
    <p>블록을 유효하게 만들려면 조건을 만족하는 해시를 <b>찾아내야</b> 합니다.<br>직접 채굴해 보세요.</p>
    <input class="nm" id="name" placeholder="이름을 입력하세요" autocomplete="off" maxlength="12">
    <button class="btn" id="join">채굴장 입장</button>
  </div>

  <div id="main" class="hidden">
    <div class="head">
      <h2>⛏️ 블록 채굴</h2>
      <p>해시 앞에 <b>0</b>이 난이도만큼 나오는 nonce를 찾으면 채굴 성공.</p>
    </div>
    <div class="who" id="who"></div>

    <div class="diff">
      <div class="dl"><span>난이도 (앞에 올 0의 개수)</span><b id="diffVal">2</b></div>
      <input type="range" id="diff" min="1" max="5" value="2">
      <div class="zeros">왼쪽일수록 쉽고, 오른쪽일수록 채굴이 폭발적으로 어려워집니다.</div>
    </div>

    <div class="block" id="block">
      <div class="bn"><span class="name">블록 #1</span><span class="badge idle" id="badge">채굴 전</span></div>
      <div class="fld"><label>데이터</label>
        <input class="data" id="data" value="BAY 거래: 민수 → 영희 5만원"></div>
      <div class="stat">
        <div class="s"><div class="k">nonce 시도</div><div class="v mono" id="nonce">0</div></div>
        <div class="s"><div class="k">걸린 시간</div><div class="v mono" id="time">—</div></div>
      </div>
      <div class="fld" style="margin-top:10px"><label>현재 해시</label>
        <div class="hashrow mono" id="hash">아직 채굴하지 않음</div></div>
      <button class="mineBtn" id="mine">⛏️ 채굴 시작</button>
    </div>

    <div id="msgZone"></div>
  </div>
</div>

<div class="host hidden" id="host">
  <span class="tag">진행자</span>
  <button id="hReset">처음으로</button>
</div>

<script>
/* 동기 SHA-256 (채굴 속도용) — UTF-8 바이트열을 입력으로 */
function sha256(ascii){
  function rr(v,a){return (v>>>a)|(v<<(32-a));}
  var mp=Math.pow,mw=mp(2,32),res='',words=[],bitLen=ascii.length*8;
  var hash=sha256.h=sha256.h||[],k=sha256.k=sha256.k||[],pc=k.length,comp={};
  for(var cand=2;pc<64;cand++){ if(!comp[cand]){ for(var i=0;i<313;i+=cand)comp[i]=cand;
    hash[pc]=(mp(cand,.5)*mw)|0; k[pc++]=(mp(cand,1/3)*mw)|0; } }
  ascii+='\x80'; while(ascii.length%64-56)ascii+='\x00';
  for(i=0;i<ascii.length;i++){ var j=ascii.charCodeAt(i); if(j>>8)return; words[i>>2]|=j<<((3-i)%4)*8; }
  words[words.length]=((bitLen/mw)|0); words[words.length]=(bitLen);
  for(j=0;j<words.length;){
    var w=words.slice(j,j+=16),oh=hash; hash=hash.slice(0,8);
    for(i=0;i<64;i++){
      var w15=w[i-15],w2=w[i-2],a=hash[0],e=hash[4];
      var t1=hash[7]+(rr(e,6)^rr(e,11)^rr(e,25))+((e&hash[5])^((~e)&hash[6]))+k[i]
        +(w[i]=i<16?w[i]:(w[i-16]+(rr(w15,7)^rr(w15,18)^(w15>>>3))+w[i-7]
        +(rr(w2,17)^rr(w2,19)^(w2>>>10)))|0);
      var t2=(rr(a,2)^rr(a,13)^rr(a,22))+((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));
      hash=[(t1+t2)|0].concat(hash); hash[4]=(hash[4]+t1)|0;
    }
    for(i=0;i<8;i++)hash[i]=(hash[i]+oh[i])|0;
  }
  for(i=0;i<8;i++)for(j=3;j+1;j--){var b=(hash[i]>>(j*8))&255;res+=((b<16)?0:'')+b.toString(16);}
  return res;
}
const utf8 = s => unescape(encodeURIComponent(s));
const $=id=>document.getElementById(id);
const S={name:'',diff:2,mined:false,nonce:0,hash:'',mining:false,stop:false};

$('join').onclick=()=>{const v=$('name').value.trim();if(!v){$('name').focus();return;}
  $('who').textContent=v+' 님'; $('gate').classList.add('hidden'); $('main').classList.remove('hidden');};
$('name').addEventListener('keydown',e=>{if(e.key==='Enter')$('join').click();});

$('diff').addEventListener('input',e=>{ S.diff=+e.target.value; $('diffVal').textContent=S.diff; invalidate(); });
$('data').addEventListener('input',()=>{ if(S.mined) invalidate(true); });

function invalidate(staleByDiff){
  if(!S.mined && !staleByDiff){ return; }
  S.mined=false;
  $('block').classList.remove('mined'); $('block').classList.add('stale');
  $('badge').className='badge stale'; $('badge').textContent='무효';
  if(staleByDiff){
    $('msgZone').innerHTML=`<div class="note warn"><b>데이터를 바꾸자 블록이 무효가 됐습니다.</b>
      해시가 달라져 더 이상 조건(0 ${S.diff}개)을 만족하지 않아요.
      <b style="margin-top:7px">위조하려면 이 블록을 <u>처음부터 다시 채굴</u>해야 합니다.</b>
      2주차에서 본 '뒤가 다 깨진다'에, 이제 '다시 만들기가 이만큼 비싸다'가 더해진 거예요.</div>`;
  }
}

function showHash(h){
  const zeros=h.match(/^0*/)[0];
  $('hash').innerHTML=`<span class="z">${zeros}</span><span class="rest">${h.slice(zeros.length)}</span>`;
}

$('mine').onclick=()=>{ if(S.mining) return; mine(); };

function mine(){
  S.mining=true; S.stop=false; S.nonce=0;
  const target='0'.repeat(S.diff);
  const data=$('data').value;
  const t0=performance.now();
  $('mine').classList.add('mining'); $('mine').textContent='⛏️ 채굴 중…';
  $('badge').className='badge idle'; $('badge').textContent='채굴 중';
  $('block').classList.remove('mined','stale');

  function chunk(){
    if(S.stop){ S.mining=false; return; }
    let steps=3000;
    while(steps-- > 0){
      const h=sha256(utf8(data+S.nonce));
      if(h.startsWith(target)){
        const t=((performance.now()-t0)/1000);
        S.mined=true; S.mining=false; S.hash=h;
        $('nonce').textContent=S.nonce.toLocaleString();
        $('time').textContent=t.toFixed(t<1?2:1)+'초';
        showHash(h);
        $('mine').classList.remove('mining'); $('mine').textContent='⛏️ 다시 채굴';
        $('badge').className='badge mined'; $('badge').textContent='✓ 채굴 완료';
        $('block').classList.add('mined');
        $('msgZone').innerHTML=`<div class="note good"><b>채굴 성공!</b>
          nonce를 <b>${S.nonce.toLocaleString()}번</b> 바꿔 시도해서 조건을 만족하는 해시를 찾았어요.
          <b style="margin-top:7px">난이도 슬라이더를 올리고 다시 채굴해 보세요 — 시도 횟수가 폭발합니다.</b></div>`;
        return;
      }
      S.nonce++;
    }
    $('nonce').textContent=S.nonce.toLocaleString();
    $('time').textContent=((performance.now()-t0)/1000).toFixed(1)+'초';
    requestAnimationFrame(chunk);
  }
  requestAnimationFrame(chunk);
}

let c=0,ct;$('glyph').addEventListener('click',()=>{c++;clearTimeout(ct);ct=setTimeout(()=>c=0,600);
  if(c>=3){c=0;$('host').classList.toggle('hidden');}});
$('hReset').onclick=()=>{ S.stop=true; S.mining=false;
  Object.assign(S,{name:'',diff:2,mined:false,nonce:0,hash:'',mining:false,stop:false});
  $('diff').value=2; $('diffVal').textContent='2'; $('data').value='BAY 거래: 민수 → 영희 5만원';
  $('nonce').textContent='0'; $('time').textContent='—'; $('hash').textContent='아직 채굴하지 않음';
  $('badge').className='badge idle'; $('badge').textContent='채굴 전';
  $('block').classList.remove('mined','stale');
  $('mine').textContent='⛏️ 채굴 시작'; $('mine').classList.remove('mining');
  $('msgZone').innerHTML=''; $('name').value='';
  $('main').classList.add('hidden'); $('gate').classList.remove('hidden'); $('host').classList.add('hidden'); };
</script>
</body>
</html>
